steps:
- task: AzureCLI@2
  displayName: Delete deployed cloud test resources
  condition: always()
  inputs:
    azureSubscription: 'iot hub sdk service connection'
    scriptType: 'pscore'
    scriptLocation: 'inlineScript'
    inlineScript: |
      Write-Host "Deleting resource group with name "
      Write-Host $(env:RESOURCE_GROUP_NAME)
      az deployment group delete --resource-group $(env:RESOURCE_GROUP_NAME) --name $(env:DEPLOYMENT_NAME) --output none --only-show-errors
      az group delete --name $(env:RESOURCE_GROUP_NAME) --y
