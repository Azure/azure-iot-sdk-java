parameters: 
- name: packagePath
  type: string
- name: condition
  type: string
  values:
    - true
    - false

steps:
- task: PowerShell@2
  displayName: Pack java package
  condition: eq(${{ parameters.condition }}, 'true')
  inputs:
    targetType: 'inline'
    script: |
      mvn package `-DskipTests -pl com.microsoft.azure.sdk.iot:iot-device-client
      Copy-Item -Path "${{ parameters.packagePath }}/target/*.jar" -Destination "$(Build.SourcesDirectory)/output" 

      # For example, "provisioning-device-client-1.2.3-javadoc"          
      $baseName = (Get-ChildItem -Path .\target\ -File -Filter "*javadoc.jar")[0].BaseName

      # For example, "provisioning-device-client-1.2.3"
      $nameWithVersion = ($baseName).Substring(0, $baseName - "-javadoc".Length)

      # Copy the flattened pom.xml because the non-flattened pom.xml has references to pom.xml files that we don't ship and the
      # flattened pom.xml resolves all of those references.
      Copy-Item -Path "${{ parameters.packagePath }}/flattened-pom.xml" -Destination "$(Build.SourcesDirectory)/output/$(nameWithVersion).pom" 
